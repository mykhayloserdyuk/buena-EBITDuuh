services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env.local   # copy from .env.local and fill in secrets
    environment:
      MODEL_PROVIDER: ${MODEL_PROVIDER:-GEMINI}
      RAW_DATA_PATH: /raw-data
    volumes:
      - ./raw-data:/raw-data:ro

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* vars are baked into the JS bundle at build time.
        # In local compose the browser fetches from localhost:8000 directly.
        NEXT_PUBLIC_BACKEND_URL: "http://localhost:8000"
    ports:
      - "3000:3000"
    environment:
      # Server-side proxy target used by next.config.ts rewrites (/api/* → backend)
      BACKEND_URL: "http://backend:8000"
    depends_on:
      - backend
